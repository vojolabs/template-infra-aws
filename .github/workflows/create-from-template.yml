name: Create Repo from Template
on:
  issues:
    types: [opened]

jobs:
  create-repository:
    # Garante que só rode para issues abertas via template específico
    if: startsWith(github.event.issue.title, 'Template')
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout Template
        uses: actions/checkout@v4

      - name: Parse Issue Body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          issue_id: .github/ISSUE_TEMPLATE/new-repo.yml

      - name: Add Start Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⏳ **Iniciando a configuração...** O repositório está sendo provisionado na organização **VojoLabs**."

      - name: Debug Payload
        run: |
            echo "Payload completo: ${{ steps.parse.outputs.jsonString }}"

      - name: Create and Configure Repo
        id: create_step
        env:
          GH_TOKEN: ${{ secrets.GHA_TOKEN }}
          # Ajustado para a chave que apareceu no seu debug
          REPO_NAME: ${{ fromJson(steps.parse.outputs.jsonString).qual_o_nome_do_novo_repositrio }}
        run: |
          if [ -z "$REPO_NAME" ]; then
            echo "❌ Erro: Variável REPO_NAME está vazia."
            exit 1
          fi
          
          echo "Nome do repositório: $REPO_NAME"
          # Usando 'vojolabs' diretamente ou github.repository_owner
          DESTINATION="VojoLabs/$REPO_NAME"
          
          # Cria o repositório a partir do template
          # Adicionei o --confirm para evitar prompts interativos
          gh repo create "$DESTINATION" \
            --template "${{ github.repository }}" \
            --public \
            --clone
          
          # Configura branch develop
          cd "$REPO_NAME"

          # --- LÓGICA DE TROCA DO README ---
          # Se o arquivo reserva existir, substitui o README atual
          if [ -f "TEMPLATE_README.md" ]; then
            mv TEMPLATE_README.md README.md
            echo "✅ README do projeto configurado."
          fi

          # --- LIMPEZA DOS ARQUIVOS DE TEMPLATE ---
          # Remove a pasta de templates de issues
          rm -rf .github/ISSUE_TEMPLATE
          
          # Remove o workflow de criação de repositório (ajuste o nome do arquivo se for diferente)
          rm -f .github/workflows/create-from-template.yml

          # Configura o Git para usar o seu token na URL remota
          # Isso evita o erro de "could not read Username"
          git remote set-url origin "https://x-access-token:${{ secrets.GHA_TOKEN }}@github.com/$DESTINATION.git"
          
          # Configura identidade básica (necessário para commits/pushes)
          git config user.name "VojoLabs Bot"
          git config user.email "bot@vojolabs.org"

          git add .
          git commit -m "chore: setup inicial"
          git push origin main

          git checkout -b develop
          git push origin develop

      - name: Success Comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Usando a mesma lógica de extração aqui
          REPO_NAME: ${{ fromJson(steps.parse.outputs.jsonString).qual_o_nome_do_novo_repositrio }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --comment "✅ **Repositório criado com sucesso!**
            
            🔗 [Acessar novo repositório](https://github.com/VojoLabs/$REPO_NAME)
            
            **Detalhes:**
            - Organização: \`VojoLabs\`
            - Branches: \`main\`, \`develop\`"

      - name: Error Comment
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "❌ **Erro na configuração:** Não foi possível criar o repositório.
            
            **Verificações sugeridas:**
            1. O nome já existe na organização **VojoLabs**?
            2. O GHA_TOKEN possui permissões de criação de repositório?
            3. O nome digitado possui caracteres proibidos (espaços, acentos)?"