name: Create Repo from Template
on:
  issues:
    types: [opened]

jobs:
  create-repository:
    # Garante que só rode para issues abertas via template específico
    if: startsWith(github.event.issue.title, 'Template')
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout Template
        uses: actions/checkout@v4

      - name: Parse Issue Body
        id: parse
        uses: peter-murray/issue-forms-body-parser@v3
        with:
          issue_id: ${{ github.event.issue.number }}
          separator: '###'
          label_marker: '###'

      - name: Add Start Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⏳ **Iniciando a configuração...** O repositório está sendo provisionado na organização **VojoLabs**."

      - name: Create and Configure Repo
        id: create_step
        env:
          GH_TOKEN: ${{ secrets.GHA_TOKEN }}
          # Extrai o valor do ID 'nome_repo' definido no seu arquivo de formulário
          REPO_NAME: ${{ fromJson(steps.parse.outputs.payload).nome_repo }}
        run: |
          if [ -z "$REPO_NAME" ]; then
            echo "❌ Erro: Não foi possível extrair o nome do repositório."
            exit 1
          fi
          
          echo "Nome do repositório: $REPO_NAME"
          DESTINATION="${{ github.repository_owner }}/$REPO_NAME"
          
          # Cria o repositório a partir do template
          gh repo create "$DESTINATION" \
            --template "${{ github.repository }}" \
            --public \
            --clone
          
          # Configura branch develop
          cd "$REPO_NAME"
          git checkout -b develop
          git push origin develop

      - name: Success Comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ fromJson(steps.parse.outputs.payload).nome_repo }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --comment "✅ **Repositório criado com sucesso!**
            
            🔗 [Acessar novo repositório](https://github.com/VojoLabs/$REPO_NAME)
            
            **Detalhes:**
            - Organização: \`VojoLabs\`
            - Branches: \`main\`, \`develop\`"

      - name: Error Comment
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "❌ **Erro na configuração:** Não foi possível criar o repositório.
            
            **Verificações sugeridas:**
            1. O nome já existe na organização **VojoLabs**?
            2. O GHA_TOKEN possui permissões de criação de repositório?
            3. O nome digitado possui caracteres proibidos (espaços, acentos)?"